<div class="card p-3 portfolio-history">
  <h2>Historial de portafolio</h2>

  <div *ngIf="isLoading" class="text-center p-5">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <div *ngIf="!isLoading && !hasData" class="text-center p-5 text-muted empty-state">
    <i class="bi bi-bar-chart-line fs-1"></i>
    <p class="mt-2 mb-0">Aún no hay snapshots de portafolio.</p>
    <p class="mb-0">Los snapshots se generarán automáticamente al actualizar precios.</p>
  </div>

  <div *ngIf="!isLoading && hasData">
    <div class="d-flex flex-wrap gap-2 mb-3 asset-filters">
      <button
        *ngFor="let name of allAssetNames"
        class="btn btn-sm"
        [class.btn-primary]="visibleAssets.has(name)"
        [class.btn-outline-secondary]="!visibleAssets.has(name)"
        (click)="toggleAsset(name)"
      >
        {{ name }}
      </button>
    </div>

    <div class="chart-wrapper">
      <canvas
        baseChart
        [type]="chartType"
        [data]="chartData"
        [options]="chartOptions"
      >
      </canvas>
    </div>
  </div>
</div>
