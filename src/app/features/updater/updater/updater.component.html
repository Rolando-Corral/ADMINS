<div class="card p-3">
  <h2>Actualizar Assets</h2>
  
  <form [formGroup]="assetForm" (ngSubmit)="onSubmit()" class="mt-3">
    
    <!-- ID (solo lectura) -->
    <div class="mb-3">
      <label for="id" class="form-label">ID</label>
      <input type="text" id="id" formControlName="id" class="form-control" readonly>
    </div>

    <!-- Nombre -->
    <div class="mb-3">
      <label for="countName" class="form-label">Nombre</label>
      <input type="text" id="countName" formControlName="countName" class="form-control" 
             [class.is-invalid]="assetForm.get('countName')?.invalid && assetForm.get('countName')?.touched">
      <div class="invalid-feedback">
        El nombre es requerido
      </div>
    </div>

    <!-- Moneda -->
    <div class="mb-3">
      <label for="currency" class="form-label">Moneda</label>
      <select id="currency" formControlName="currency" class="form-select">
        <option *ngFor="let curr of currencies" [value]="curr">{{ curr }}</option>
      </select>
    </div>

    <!-- Acciones/Shares -->
    <div class="mb-3">
      <label for="shares" class="form-label">Cantidad de acciones (opcional)</label>
      <input type="number" id="shares" formControlName="shares" class="form-control" step="0.000000001" min="0">
    </div>

    <!-- Precio de compra -->
    <div class="mb-3">
      <label for="acquisitionCostUsd" class="form-label">Precio de compra (USD)</label>
      <input type="number" id="acquisitionCostUsd" formControlName="acquisitionCostUsd" class="form-control"
             [class.is-invalid]="assetForm.get('acquisitionCostUsd')?.invalid && assetForm.get('acquisitionCostUsd')?.touched"
             step="0.01" min="0">
      <div class="invalid-feedback">
        El precio es requerido y debe ser mayor a 0
      </div>
    </div>

    <!-- Categoría -->
    <div class="mb-3">
      <label for="category" class="form-label">Categoría</label>
      <select id="category" formControlName="category" class="form-select"
              [class.is-invalid]="assetForm.get('category')?.invalid && assetForm.get('category')?.touched">
        <option value="">Seleccionar...</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
      <div class="invalid-feedback">
        La categoría es requerida
      </div>
    </div>

    <!-- Botones -->
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="assetForm.invalid">
        Guardar Asset
      </button>
      <button type="button" class="btn btn-secondary" (click)="resetForm()">
        Limpiar
      </button>
    </div>

  </form>
</div>
